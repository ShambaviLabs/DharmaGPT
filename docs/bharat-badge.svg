<!-- ShambaviLabs Bharat Badge v1 — github.com/ShambaviLabs/DharmaGPT — fork to use -->
<svg xmlns="http://www.w3.org/2000/svg" width="90" height="60" role="img" aria-label="From Bharat to the World — ShambaviLabs">
  <title>From Bharat to the World — ShambaviLabs</title>

  <clipPath id="clip">
    <rect width="90" height="60" rx="4" fill="#fff"/>
  </clipPath>

  <g clip-path="url(#clip)">
    <!-- Saffron -->
    <rect width="90" height="20" fill="#FF9933"/>
    <!-- White -->
    <rect y="20" width="90" height="20" fill="#FFFFFF"/>
    <!-- India green -->
    <rect y="40" width="90" height="20" fill="#138808"/>
  </g>

  <!-- Ashoka Chakra — navy blue, centered on white stripe (cx=45, cy=30) -->
  <!-- Outer ring -->
  <circle cx="45" cy="30" r="13" fill="none" stroke="#000080" stroke-width="1.3"/>
  <!-- Hub -->
  <circle cx="45" cy="30" r="2.2" fill="#000080"/>

  <!-- 24 spokes at 15° intervals, hub r=2.2, outer r=13 -->
  <g stroke="#000080" stroke-width="0.9">
    <line x1="45.00" y1="27.80" x2="45.00" y2="17.00"/>
    <line x1="45.57" y1="27.88" x2="48.37" y2="17.44"/>
    <line x1="46.10" y1="28.10" x2="51.50" y2="18.74"/>
    <line x1="46.56" y1="28.44" x2="54.19" y2="20.81"/>
    <line x1="46.90" y1="28.90" x2="56.26" y2="23.50"/>
    <line x1="47.12" y1="29.43" x2="57.56" y2="26.64"/>
    <line x1="47.20" y1="30.00" x2="58.00" y2="30.00"/>
    <line x1="47.12" y1="30.57" x2="57.56" y2="33.36"/>
    <line x1="46.90" y1="31.10" x2="56.26" y2="36.50"/>
    <line x1="46.56" y1="31.56" x2="54.19" y2="39.19"/>
    <line x1="46.10" y1="31.90" x2="51.50" y2="41.26"/>
    <line x1="45.57" y1="32.12" x2="48.37" y2="42.56"/>
    <line x1="45.00" y1="32.20" x2="45.00" y2="43.00"/>
    <line x1="44.43" y1="32.12" x2="41.63" y2="42.56"/>
    <line x1="43.90" y1="31.90" x2="38.50" y2="41.26"/>
    <line x1="43.44" y1="31.56" x2="35.81" y2="39.19"/>
    <line x1="43.10" y1="31.10" x2="33.74" y2="36.50"/>
    <line x1="42.88" y1="30.57" x2="32.44" y2="33.36"/>
    <line x1="42.80" y1="30.00" x2="32.00" y2="30.00"/>
    <line x1="42.88" y1="29.43" x2="32.44" y2="26.64"/>
    <line x1="43.10" y1="28.90" x2="33.74" y2="23.50"/>
    <line x1="43.44" y1="28.44" x2="35.81" y2="20.81"/>
    <line x1="43.90" y1="28.10" x2="38.50" y2="18.74"/>
    <line x1="44.43" y1="27.88" x2="41.63" y2="17.44"/>
  </g>

  <!-- Thin border -->
  <rect width="90" height="60" rx="4" fill="none" stroke="#ccc" stroke-width="0.8"/>
</svg>

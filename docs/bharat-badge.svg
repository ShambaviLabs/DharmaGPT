<!-- ShambaviLabs Bharat Badge v1 — github.com/ShambaviLabs/DharmaGPT — fork to use -->
<svg xmlns="http://www.w3.org/2000/svg" width="252" height="60" role="img" aria-label="From Bharat to the World — ShambaviLabs">
  <title>From Bharat to the World — ShambaviLabs</title>

  <clipPath id="clip">

    <line x1="46.10" y1="31.90" x2="51.50" y2="41.26"/>
    <line x1="45.57" y1="32.12" x2="48.37" y2="42.56"/>
    <line x1="45.00" y1="32.20" x2="45.00" y2="43.00"/>

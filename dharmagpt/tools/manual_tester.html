<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DharmaGPT — Manual Testing Console</title>
<style>
  :root {
    --saffron: #E07B39;
    --saffron-light: #F5A623;
    --deep: #1A1A2E;
    --card: #16213E;
    --border: #2E3A5A;
    --text: #E8E8F0;
    --muted: #8A8FAA;
    --green: #4CAF73;
    --red: #E05555;
    --gold: #F5A623;
    --score-high: #4CAF73;
    --score-mid: #F5A623;
    --score-low: #E05555;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--deep);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ─── Header ─────────────────────────────────────────────────── */
  header {
    background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
    border-bottom: 2px solid var(--saffron);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 20px; color: var(--saffron-light); letter-spacing: 0.5px; }
  header h1 span { color: var(--muted); font-size: 13px; font-weight: normal; margin-left: 10px; }
  .header-stats { display: flex; gap: 16px; font-size: 12px; color: var(--muted); }
  .header-stats b { color: var(--saffron-light); }

  /* ─── Layout ──────────────────────────────────────────────────── */
  .layout { display: grid; grid-template-columns: 380px 1fr; height: calc(100vh - 57px); }

  /* ─── Left Panel: Query Form ──────────────────────────────────── */
  .left {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    background: #12172A;
  }

  label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 6px; }

  textarea, select, input[type=text] {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 12px;
    font-size: 14px;
    font-family: inherit;
    transition: border-color 0.2s;
    resize: vertical;
  }
  textarea:focus, select:focus, input:focus { outline: none; border-color: var(--saffron); }
  textarea { min-height: 100px; }
  select { cursor: pointer; appearance: none; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.3px;
  }
  .btn-primary {
    background: var(--saffron);
    color: white;
  }
  .btn-primary:hover { background: var(--saffron-light); transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .btn-secondary {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    font-size: 13px;
    padding: 8px;
    margin-top: -8px;
  }
  .btn-secondary:hover { border-color: var(--saffron); color: var(--saffron-light); }

  /* ─── Quick Questions ─────────────────────────────────────────── */
  .quick-header { font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
  .quick-list { display: flex; flex-direction: column; gap: 6px; }
  .quick-q {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }
  .quick-q:hover { border-color: var(--saffron); color: var(--text); background: #1E2A45; }
  .quick-q .mode-tag {
    display: inline-block;
    font-size: 10px;
    padding: 1px 5px;
    border-radius: 3px;
    background: #2E3A5A;
    color: var(--muted);
    margin-right: 5px;
    text-transform: uppercase;
  }

  /* ─── Gold Store Stats ────────────────────────────────────────── */
  .gold-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
  }
  .gold-box h3 { font-size: 12px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
  .gold-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .gold-stat { text-align: center; }
  .gold-stat .num { font-size: 22px; font-weight: 700; color: var(--saffron-light); }
  .gold-stat .lbl { font-size: 10px; color: var(--muted); }

  .btn-export {
    width: 100%;
    margin-top: 10px;
    padding: 7px;
    background: transparent;
    border: 1px solid var(--gold);
    color: var(--gold);
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
  }
  .btn-export:hover { background: var(--gold); color: var(--deep); }

  /* ─── Right Panel ─────────────────────────────────────────────── */
  .right { overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

  /* Loading / Empty ───────────────────────────────────────────────*/
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    color: var(--muted);
    gap: 10px;
    padding: 60px;
    text-align: center;
  }
  .empty .om { font-size: 48px; opacity: 0.2; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--saffron);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Answer Card ───────────────────────────────────────────────────*/
  .answer-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .answer-header {
    padding: 14px 18px;
    background: #1E2A45;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .answer-meta { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag-mode { background: #2A3A6A; color: #7B9EFF; }
  .tag-sources { background: #2A4A3A; color: #6BD89A; }
  .tag-time { background: #3A2A1A; color: #F5A623; }
  .answer-id { font-size: 10px; color: var(--muted); font-family: monospace; }

  .answer-body { padding: 18px; line-height: 1.75; white-space: pre-wrap; font-size: 14.5px; }

  /* Rating ────────────────────────────────────────────────────────*/
  .rating-bar {
    padding: 14px 18px;
    border-top: 1px solid var(--border);
    background: #12172A;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .rating-label { font-size: 12px; color: var(--muted); white-space: nowrap; }

  .stars { display: flex; gap: 4px; }
  .star {
    font-size: 22px;
    cursor: pointer;
    color: var(--border);
    transition: color 0.1s, transform 0.1s;
    line-height: 1;
  }
  .star:hover, .star.active { color: var(--gold); transform: scale(1.15); }

  .notes-input {
    flex: 1;
    min-width: 160px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 7px 10px;
    font-size: 12px;
    font-family: inherit;
  }
  .notes-input:focus { outline: none; border-color: var(--saffron); }

  .btn-save {
    padding: 8px 16px;
    background: var(--green);
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-save:hover { background: #3DA85F; }
  .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-save.saved { background: #2A5A3A; color: #6BD89A; }

  /* Sources ───────────────────────────────────────────────────────*/
  .sources-section { }
  .sources-header {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sources-grid { display: flex; flex-direction: column; gap: 8px; }

  .source-chunk {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
    border-left: 3px solid var(--border);
    transition: border-color 0.15s;
  }
  .source-chunk:hover { border-left-color: var(--saffron); }
  .source-chunk.score-high { border-left-color: var(--score-high); }
  .source-chunk.score-mid  { border-left-color: var(--score-mid); }
  .source-chunk.score-low  { border-left-color: var(--score-low); }

  .chunk-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chunk-citation { font-size: 12px; color: var(--saffron-light); font-weight: 600; }
  .chunk-meta { display: flex; gap: 6px; align-items: center; }
  .score-badge {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 10px;
    font-family: monospace;
  }
  .score-badge.high { background: #1A3A2A; color: var(--score-high); }
  .score-badge.mid  { background: #3A2A0A; color: var(--score-mid); }
  .score-badge.low  { background: #3A1A1A; color: var(--score-low); }
  .source-type-badge {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    background: #2E3A5A;
    color: var(--muted);
    text-transform: uppercase;
  }
  .chunk-text {
    font-size: 12.5px;
    color: #B0B5CC;
    line-height: 1.6;
    max-height: 120px;
    overflow: hidden;
    position: relative;
  }
  .chunk-text.expanded { max-height: none; }
  .chunk-text::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 40px;
    background: linear-gradient(transparent, var(--card));
    pointer-events: none;
  }
  .chunk-text.expanded::after { display: none; }
  .btn-expand {
    font-size: 11px;
    color: var(--saffron);
    background: none;
    border: none;
    cursor: pointer;
    padding: 4px 0;
    margin-top: 4px;
  }
  .btn-expand:hover { text-decoration: underline; }

  /* History ───────────────────────────────────────────────────────*/
  .history-section { border-top: 1px solid var(--border); padding-top: 16px; }
  .history-header {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .history-list { display: flex; flex-direction: column; gap: 6px; }
  .history-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.15s;
  }
  .history-item:hover { border-color: var(--saffron); }
  .history-q { flex: 1; font-size: 12px; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-rating { font-size: 12px; color: var(--gold); }
  .history-saved-badge { font-size: 10px; padding: 2px 5px; background: #1A3A2A; color: var(--green); border-radius: 3px; }

  /* Error ─────────────────────────────────────────────────────────*/
  .error-card {
    background: #2A1515;
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 16px;
    color: #FF8A8A;
    font-size: 13px;
  }

  /* Toast ─────────────────────────────────────────────────────────*/
  .toast {
    position: fixed;
    bottom: 24px; right: 24px;
    background: var(--green);
    color: white;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    z-index: 999;
    animation: slideIn 0.2s ease;
    display: none;
  }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } }

  /* Scrollbar ─────────────────────────────────────────────────────*/
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>🕉 DharmaGPT <span>Manual Testing Console</span></h1>
  <div class="header-stats">
    <span>API: <b id="api-url-display">localhost:8000</b></span>
    <span>Gold Store: <b id="gold-count">0</b> entries</span>
    <span>Session: <b id="session-count">0</b> queries</span>
  </div>
</header>

<div class="layout">

  <!-- ─── LEFT PANEL ─────────────────────────────────────────── -->
  <div class="left">

    <div>
      <label>API Base URL</label>
      <input type="text" id="api-base" value="http://localhost:8000" placeholder="http://localhost:8000">
    </div>

    <div>
      <label>Question</label>
      <textarea id="query" placeholder="Ask a dharmic question…&#10;e.g. How should I deal with anger?"></textarea>
    </div>

    <div class="row2">
      <div>
        <label>Mode</label>
        <select id="mode">
          <option value="guidance">🧘 Guidance</option>
          <option value="story">📖 Story</option>
          <option value="children">🌸 Children</option>
          <option value="scholar">📚 Scholar</option>
        </select>
      </div>
      <div>
        <label>Filter Section</label>
        <input type="text" id="filter-section" placeholder="e.g. Sundara Kanda">
      </div>
    </div>

    <button class="btn btn-primary" id="ask-btn" onclick="submitQuery()">
      Ask DharmaGPT ›
    </button>
    <button class="btn btn-secondary" onclick="clearForm()">↺ Clear</button>

    <hr style="border-color: var(--border);">

    <!-- Quick Questions -->
    <div class="quick-header">Sample Questions</div>
    <div class="quick-list" id="quick-list"></div>

    <hr style="border-color: var(--border);">

    <!-- Gold Store -->
    <div class="gold-box">
      <h3>📦 Gold Store</h3>
      <div class="gold-stats">
        <div class="gold-stat">
          <div class="num" id="gs-total">0</div>
          <div class="lbl">Total Saved</div>
        </div>
        <div class="gold-stat">
          <div class="num" id="gs-avg">—</div>
          <div class="lbl">Avg Rating</div>
        </div>
      </div>
      <button class="btn-export" onclick="exportGoldStore()">⬇ Export gold_store.jsonl</button>
      <button class="btn-export" style="margin-top:6px; border-color:var(--muted); color:var(--muted);" onclick="clearGoldStore()">🗑 Clear Store</button>
    </div>

    <!-- History -->
    <div>
      <div class="quick-header">Session History</div>
      <div class="history-list" id="history-list" style="margin-top:8px;"></div>
    </div>

  </div>

  <!-- ─── RIGHT PANEL ────────────────────────────────────────── -->
  <div class="right" id="right-panel">
    <div class="empty" id="empty-state">
      <div class="om">ॐ</div>
      <div style="font-size:16px; color: var(--muted);">Enter a question and press Ask</div>
      <div style="font-size:12px; color: var(--border);">Results will appear here with citations and retrieval scores</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ─── State ─────────────────────────────────────────────────────────────────
const GOLD_KEY = 'dharmagpt_gold_store';
const SESSION_KEY = 'dharmagpt_session';

let goldStore = JSON.parse(localStorage.getItem(GOLD_KEY) || '[]');
let sessionHistory = [];
let sessionCount = 0;
let currentResponse = null;
let currentRating = 0;

// ─── Sample Questions ───────────────────────────────────────────────────────
const SAMPLE_QS = [
  { q: "How should I deal with anger and frustration in daily life?", mode: "guidance" },
  { q: "My family wants me to do something I believe is wrong. What does dharma say?", mode: "guidance" },
  { q: "Tell me the story of Hanuman crossing the ocean to reach Lanka", mode: "story" },
  { q: "Retell the moment Sita is found by Hanuman in Ashoka Vatika", mode: "story" },
  { q: "Tell me about Hanuman's bravery for a young child", mode: "children" },
  { q: "What does the Valmiki Ramayana say about the qualities of an ideal king?", mode: "scholar" },
  { q: "Cite specific verses where Hanuman first sees Sita in Sundara Kanda", mode: "scholar" },
  { q: "How can I find peace when I am grieving a loss?", mode: "guidance" },
];

function initQuickList() {
  const el = document.getElementById('quick-list');
  el.innerHTML = SAMPLE_QS.map((s, i) => `
    <button class="quick-q" onclick="loadSample(${i})">
      <span class="mode-tag">${s.mode}</span>${s.q}
    </button>
  `).join('');
}

function loadSample(i) {
  const s = SAMPLE_QS[i];
  document.getElementById('query').value = s.q;
  document.getElementById('mode').value = s.mode;
  document.getElementById('filter-section').value = '';
}

// ─── Query Submission ───────────────────────────────────────────────────────
async function submitQuery() {
  const query = document.getElementById('query').value.trim();
  if (!query) return;

  const mode = document.getElementById('mode').value;
  const filterSection = document.getElementById('filter-section').value.trim();
  const apiBase = document.getElementById('api-base').value.trim().replace(/\/$/, '');

  document.getElementById('api-url-display').textContent = apiBase.replace('http://', '').replace('https://', '');

  const btn = document.getElementById('ask-btn');
  btn.disabled = true;
  btn.textContent = 'Thinking…';

  showLoading();

  const startTime = Date.now();

  try {
    const body = { query, mode, history: [], language: "en" };
    if (filterSection) body.filter_section = filterSection;

    const resp = await fetch(`${apiBase}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(`HTTP ${resp.status}: ${err}`);
    }

    const data = await resp.json();
    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

    currentResponse = { query, mode, filterSection, data, elapsed, timestamp: new Date().toISOString() };
    currentRating = 0;

    sessionCount++;
    document.getElementById('session-count').textContent = sessionCount;

    renderResponse(currentResponse);
    addToHistory(currentResponse);

  } catch (err) {
    renderError(err.message);
  }

  btn.disabled = false;
  btn.textContent = 'Ask DharmaGPT ›';
}

// ─── Render ─────────────────────────────────────────────────────────────────
function showLoading() {
  document.getElementById('right-panel').innerHTML = `
    <div class="empty">
      <div class="spinner"></div>
      <div style="color:var(--muted); margin-top:12px;">Retrieving passages and generating answer…</div>
    </div>
  `;
}

function renderError(msg) {
  document.getElementById('right-panel').innerHTML = `
    <div class="error-card">
      <b>⚠ Error connecting to DharmaGPT API</b><br><br>
      ${msg}<br><br>
      <small>Make sure your FastAPI server is running: <code>uvicorn api.main:app --reload</code></small>
    </div>
  `;
}

function scoreClass(score) {
  if (score >= 0.75) return 'high';
  if (score >= 0.55) return 'mid';
  return 'low';
}

function renderResponse(ctx) {
  const { query, mode, data, elapsed } = ctx;
  const sources = data.sources || [];

  const sourcesHtml = sources.map((s, i) => {
    const sc = scoreClass(s.score);
    return `
      <div class="source-chunk score-${sc}">
        <div class="chunk-header">
          <div class="chunk-citation">${s.citation || 'Unknown source'}</div>
          <div class="chunk-meta">
            <span class="score-badge ${sc}">${s.score.toFixed(4)}</span>
            <span class="source-type-badge">${s.source_type}</span>
            ${s.audio_timestamp ? `<span class="source-type-badge" style="color:#F5A623;">🎧 ${s.audio_timestamp}</span>` : ''}
          </div>
        </div>
        <div class="chunk-text" id="chunk-text-${i}">${escapeHtml(s.text)}</div>
        <button class="btn-expand" onclick="toggleChunk(${i})">Show more ↓</button>
      </div>
    `;
  }).join('');

  document.getElementById('right-panel').innerHTML = `

    <div class="answer-card">
      <div class="answer-header">
        <div class="answer-meta">
          <span class="tag tag-mode">${mode}</span>
          <span class="tag tag-sources">${sources.length} sources retrieved</span>
          <span class="tag tag-time">⏱ ${elapsed}s</span>
        </div>
        <div class="answer-id">${data.query_id || ''}</div>
      </div>

      <div class="answer-body">${escapeHtml(data.answer)}</div>

      <div class="rating-bar">
        <span class="rating-label">Rate this answer:</span>
        <div class="stars" id="stars">
          ${[1,2,3,4,5].map(n => `<span class="star" onclick="setRating(${n})" data-val="${n}">★</span>`).join('')}
        </div>
        <input class="notes-input" id="rating-notes" placeholder="Optional note (what's good/bad, what the ideal answer should say…)">
        <button class="btn-save" id="save-btn" onclick="saveToGold()">Save to Gold Store</button>
      </div>
    </div>

    <div class="sources-section">
      <div class="sources-header">
        Retrieved Passages
        <span style="color:var(--border); font-weight:normal;">— ranked by cosine similarity</span>
      </div>
      <div class="sources-grid">
        ${sourcesHtml || '<div style="color:var(--muted); font-size:13px;">No passages retrieved above score threshold.</div>'}
      </div>
    </div>

  `;
}

function toggleChunk(i) {
  const el = document.getElementById(`chunk-text-${i}`);
  const btn = el.nextElementSibling;
  el.classList.toggle('expanded');
  btn.textContent = el.classList.contains('expanded') ? 'Show less ↑' : 'Show more ↓';
}

// ─── Rating ──────────────────────────────────────────────────────────────────
function setRating(n) {
  currentRating = n;
  document.querySelectorAll('.star').forEach(s => {
    s.classList.toggle('active', parseInt(s.dataset.val) <= n);
  });
}

function saveToGold() {
  if (!currentResponse) return;
  if (currentRating === 0) { showToast('Please rate (1–5 stars) before saving', '#E07B39'); return; }

  const entry = {
    timestamp: currentResponse.timestamp,
    query: currentResponse.query,
    mode: currentResponse.mode,
    filter_section: currentResponse.filterSection || null,
    rating: currentRating,
    notes: document.getElementById('rating-notes').value.trim(),
    answer: currentResponse.data.answer,
    query_id: currentResponse.data.query_id,
    sources: (currentResponse.data.sources || []).map(s => ({
      citation: s.citation,
      score: s.score,
      source_type: s.source_type,
      section: s.section,
      chapter: s.chapter,
      verse: s.verse,
    })),
    elapsed_sec: parseFloat(currentResponse.elapsed),
  };

  goldStore.push(entry);
  localStorage.setItem(GOLD_KEY, JSON.stringify(goldStore));
  updateGoldStats();

  const btn = document.getElementById('save-btn');
  btn.textContent = '✓ Saved!';
  btn.classList.add('saved');
  btn.disabled = true;

  // Update history item
  updateHistoryItem(currentResponse.data.query_id, currentRating);

  showToast(`Saved to gold store (${currentRating}★)`);
}

// ─── Gold Store ───────────────────────────────────────────────────────────────
function updateGoldStats() {
  document.getElementById('gold-count').textContent = goldStore.length;
  document.getElementById('gs-total').textContent = goldStore.length;
  if (goldStore.length > 0) {
    const avg = goldStore.reduce((s, e) => s + e.rating, 0) / goldStore.length;
    document.getElementById('gs-avg').textContent = avg.toFixed(1) + '★';
  } else {
    document.getElementById('gs-avg').textContent = '—';
  }
}

function exportGoldStore() {
  if (goldStore.length === 0) { showToast('Gold store is empty', '#E07B39'); return; }
  const jsonl = goldStore.map(e => JSON.stringify(e)).join('\n');
  const blob = new Blob([jsonl], { type: 'application/x-ndjson' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `gold_store_${new Date().toISOString().slice(0,10)}.jsonl`;
  a.click();
  URL.revokeObjectURL(url);
  showToast(`Exported ${goldStore.length} entries`);
}

function clearGoldStore() {
  if (!confirm(`Clear all ${goldStore.length} gold store entries? This cannot be undone.`)) return;
  goldStore = [];
  localStorage.removeItem(GOLD_KEY);
  updateGoldStats();
  showToast('Gold store cleared', '#E05555');
}

// ─── History ──────────────────────────────────────────────────────────────────
function addToHistory(ctx) {
  sessionHistory.unshift(ctx);
  renderHistory();
}

function updateHistoryItem(queryId, rating) {
  const item = sessionHistory.find(h => h.data.query_id === queryId);
  if (item) item.rating = rating;
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('history-list');
  if (sessionHistory.length === 0) {
    el.innerHTML = '<div style="color:var(--border);font-size:12px;">No queries yet</div>';
    return;
  }
  el.innerHTML = sessionHistory.slice(0, 15).map((h, i) => `
    <div class="history-item" onclick="restoreHistory(${i})">
      <span class="tag tag-mode" style="font-size:10px;">${h.mode}</span>
      <span class="history-q">${escapeHtml(h.query)}</span>
      ${h.rating ? `<span class="history-rating">${'★'.repeat(h.rating)}</span>` : ''}
      ${h.rating ? `<span class="history-saved-badge">saved</span>` : ''}
    </div>
  `).join('');
}

function restoreHistory(i) {
  const h = sessionHistory[i];
  document.getElementById('query').value = h.query;
  document.getElementById('mode').value = h.mode;
  document.getElementById('filter-section').value = h.filterSection || '';
  currentResponse = h;
  currentRating = h.rating || 0;
  renderResponse(h);
  if (h.rating) {
    setRating(h.rating);
    const btn = document.getElementById('save-btn');
    if (btn) { btn.textContent = '✓ Saved!'; btn.classList.add('saved'); btn.disabled = true; }
  }
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function clearForm() {
  document.getElementById('query').value = '';
  document.getElementById('filter-section').value = '';
  document.getElementById('mode').value = 'guidance';
}

function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

let toastTimer;
function showToast(msg, bg = '#4CAF73') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = bg;
  t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = 'none'; }, 2800);
}

// Enter key in textarea to submit (Ctrl+Enter or Cmd+Enter)
document.addEventListener('DOMContentLoaded', () => {
  initQuickList();
  updateGoldStats();
  renderHistory();

  document.getElementById('query').addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') submitQuery();
  });
});
</script>
